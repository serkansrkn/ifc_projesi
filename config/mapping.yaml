# ─────────────────────────────────────────────────────────────────────────────
# IFC Pipeline — Mapping Configuration
# Her element tipi için ifc_classes, quantity_sets, property_sets tanımlanır.
# Yazılım farklılıkları fallback zincirleriyle absorbe edilir.
#
# Fallback zinciri okuma sırası:
#   1. quantity_sets (IfcElementQuantity)   → önce standart Qto isimleri
#   2. property_sets (IfcPropertySet)       → QSet bulunamadığında
#   3. scan_quantity_by_type()              → extractor.py generic tarama
#   4. scan_property_by_type()             → son çare, tüm Pset'leri tara
# ─────────────────────────────────────────────────────────────────────────────

element_types:

  wall:
    ifc_classes:
      - IfcWall
      - IfcWallStandardCase
      - IfcWallElementedCase
    quantity_sets:
      area:
        - [Qto_WallBaseQuantities, GrossSideArea]
        - [Qto_WallBaseQuantities, NetSideArea]
        - [BaseQuantities, GrossSideArea]
        - [BaseQuantities, NetSideArea]
        # Tekla — bazı versiyonlar quantity'yi Tekla Quantity içine yazar
        - [Tekla Quantity, Area]
        - [Tekla Quantity, Net area]
      volume:
        - [Qto_WallBaseQuantities, GrossVolume]
        - [Qto_WallBaseQuantities, NetVolume]
        - [BaseQuantities, GrossVolume]
        - [BaseQuantities, NetVolume]
        - [Tekla Quantity, Volume]
        - [Tekla Quantity, Net volume]
      length:
        - [Qto_WallBaseQuantities, Length]
        - [BaseQuantities, Length]
        - [Tekla Quantity, Length]
      height:
        - [Qto_WallBaseQuantities, Height]
        - [BaseQuantities, Height]
    property_sets:
      is_external:
        - [Pset_WallCommon, IsExternal]
      fire_rating:
        - [Pset_WallCommon, FireRating]
      load_bearing:
        - [Pset_WallCommon, LoadBearing]

  beam:
    ifc_classes:
      - IfcBeam
      - IfcBeamStandardCase
    quantity_sets:
      length:
        - [Qto_BeamBaseQuantities, Length]
        - [BaseQuantities, Length]
        - [Tekla Quantity, Length]
      volume:
        - [Qto_BeamBaseQuantities, GrossVolume]
        - [Qto_BeamBaseQuantities, NetVolume]
        - [BaseQuantities, GrossVolume]
        - [Tekla Quantity, Volume]
        - [Tekla Quantity, Net volume]
      weight:
        # Tekla çelik kirişler için ağırlık
        - [Tekla Quantity, Weight]
        - [Tekla Quantity, Net weight]
        - [Tekla Common, WEIGHT]
      cross_section_area:
        - [Qto_BeamBaseQuantities, CrossSectionArea]
        - [BaseQuantities, CrossSectionArea]
    property_sets:
      is_external:
        - [Pset_BeamCommon, IsExternal]
      load_bearing:
        - [Pset_BeamCommon, LoadBearing]
      structural_material:
        - [Pset_BeamCommon, Material]
        - [Tekla Common, MATERIAL]
      profile:
        - [Tekla Common, PROFILE]
      tekla_class:
        - [Tekla Common, CLASS]

  column:
    ifc_classes:
      - IfcColumn
      - IfcColumnStandardCase
    quantity_sets:
      length:
        - [Qto_ColumnBaseQuantities, Length]
        - [BaseQuantities, Length]
        - [Tekla Quantity, Length]
      volume:
        - [Qto_ColumnBaseQuantities, GrossVolume]
        - [Qto_ColumnBaseQuantities, NetVolume]
        - [BaseQuantities, GrossVolume]
        - [Tekla Quantity, Volume]
        - [Tekla Quantity, Net volume]
      weight:
        - [Tekla Quantity, Weight]
        - [Tekla Quantity, Net weight]
        - [Tekla Common, WEIGHT]
    property_sets:
      is_external:
        - [Pset_ColumnCommon, IsExternal]
      load_bearing:
        - [Pset_ColumnCommon, LoadBearing]
      profile:
        - [Tekla Common, PROFILE]
      structural_material:
        - [Tekla Common, MATERIAL]
      tekla_class:
        - [Tekla Common, CLASS]

  slab:
    ifc_classes:
      - IfcSlab
    quantity_sets:
      area:
        - [Qto_SlabBaseQuantities, GrossArea]
        - [Qto_SlabBaseQuantities, NetArea]
        - [BaseQuantities, GrossArea]
        - [BaseQuantities, NetArea]
        - [Tekla Quantity, Area]
        - [Tekla Quantity, Net area]
      volume:
        - [Qto_SlabBaseQuantities, GrossVolume]
        - [Qto_SlabBaseQuantities, NetVolume]
        - [BaseQuantities, GrossVolume]
        - [Tekla Quantity, Volume]
        - [Tekla Quantity, Net volume]
      thickness:
        - [Qto_SlabBaseQuantities, Depth]
        - [BaseQuantities, Depth]
    property_sets:
      is_external:
        - [Pset_SlabCommon, IsExternal]
      load_bearing:
        - [Pset_SlabCommon, LoadBearing]
      fire_rating:
        - [Pset_SlabCommon, FireRating]
      tekla_class:
        - [Tekla Common, CLASS]

  door:
    ifc_classes:
      - IfcDoor
    quantity_sets:
      area:
        - [Qto_DoorBaseQuantities, Area]
        - [BaseQuantities, Area]
      width:
        - [Qto_DoorBaseQuantities, Width]
        - [BaseQuantities, Width]
      height:
        - [Qto_DoorBaseQuantities, Height]
        - [BaseQuantities, Height]
    property_sets:
      fire_rating:
        - [Pset_DoorCommon, FireRating]

  window:
    ifc_classes:
      - IfcWindow
    quantity_sets:
      area:
        - [Qto_WindowBaseQuantities, Area]
        - [BaseQuantities, Area]
    property_sets:
      thermal_transmittance:
        - [Pset_WindowCommon, ThermalTransmittance]

  member:
    ifc_classes:
      - IfcMember
      - IfcMemberStandardCase
    quantity_sets:
      length:
        - [Qto_MemberBaseQuantities, Length]
        - [BaseQuantities, Length]
        - [Tekla Quantity, Length]
      volume:
        - [Qto_MemberBaseQuantities, GrossVolume]
        - [BaseQuantities, GrossVolume]
        - [Tekla Quantity, Volume]
        - [Tekla Quantity, Net volume]
      weight:
        # Çelik profile ağırlığı — maliyet hesabında ton cinsinden
        - [Qto_MemberBaseQuantities, Weight]
        - [Tekla Quantity, Weight]
        - [Tekla Quantity, Net weight]
        - [Tekla Common, WEIGHT]
    property_sets:
      profile:
        - [Tekla Common, PROFILE]
      structural_material:
        - [Tekla Common, MATERIAL]
      tekla_class:
        - [Tekla Common, CLASS]

  footing:
    ifc_classes:
      - IfcFooting
    quantity_sets:
      volume:
        - [Qto_FootingBaseQuantities, GrossVolume]
        - [BaseQuantities, GrossVolume]
        - [Tekla Quantity, Volume]
        - [Tekla Quantity, Net volume]
      area:
        - [Qto_FootingBaseQuantities, GrossArea]
        - [BaseQuantities, GrossArea]
        - [Tekla Quantity, Area]
    property_sets:
      is_external:
        - [Pset_FootingCommon, IsExternal]
      load_bearing:
        - [Pset_FootingCommon, LoadBearing]
      tekla_class:
        - [Tekla Common, CLASS]

  pile:
    ifc_classes:
      - IfcPile
    quantity_sets:
      length:
        - [Qto_PileBaseQuantities, Length]
        - [BaseQuantities, Length]
        - [Tekla Quantity, Length]
      volume:
        - [Qto_PileBaseQuantities, GrossVolume]
        - [BaseQuantities, GrossVolume]
        - [Tekla Quantity, Volume]
    property_sets:
      load_bearing:
        - [Pset_PileCommon, LoadBearing]
      tekla_class:
        - [Tekla Common, CLASS]

  stair:
    ifc_classes:
      - IfcStair
      - IfcStairFlight
    quantity_sets:
      area:
        - [Qto_StairBaseQuantities, GrossFloorArea]
        - [BaseQuantities, GrossFloorArea]
      volume:
        - [Qto_StairBaseQuantities, GrossVolume]
        - [BaseQuantities, GrossVolume]

  roof:
    ifc_classes:
      - IfcRoof
    quantity_sets:
      area:
        - [Qto_RoofBaseQuantities, GrossArea]
        - [BaseQuantities, GrossArea]
      volume:
        - [Qto_RoofBaseQuantities, GrossVolume]
        - [BaseQuantities, GrossVolume]

  curtain_wall:
    ifc_classes:
      - IfcCurtainWall
    quantity_sets:
      area:
        - [Qto_CurtainWallBaseQuantities, GrossSideArea]
        - [BaseQuantities, GrossSideArea]
        - [Qto_CurtainWallBaseQuantities, NetSideArea]
      length:
        - [Qto_CurtainWallBaseQuantities, Length]
        - [BaseQuantities, Length]
    property_sets:
      is_external:
        - [Pset_CurtainWallCommon, IsExternal]
      fire_rating:
        - [Pset_CurtainWallCommon, FireRating]

  railing:
    ifc_classes:
      - IfcRailing
    quantity_sets:
      length:
        - [Qto_RailingBaseQuantities, Length]
        - [BaseQuantities, Length]
    property_sets:
      is_external:
        - [Pset_RailingCommon, IsExternal]

  ramp:
    ifc_classes:
      - IfcRamp
      - IfcRampFlight
    quantity_sets:
      area:
        - [Qto_RampBaseQuantities, GrossArea]
        - [BaseQuantities, GrossArea]
      volume:
        - [Qto_RampBaseQuantities, GrossVolume]
        - [BaseQuantities, GrossVolume]
    property_sets:
      is_external:
        - [Pset_RampCommon, IsExternal]
      fire_rating:
        - [Pset_RampCommon, FireRating]

  covering:
    ifc_classes:
      - IfcCovering
    quantity_sets:
      area:
        - [Qto_CoveringBaseQuantities, GrossArea]
        - [BaseQuantities, GrossArea]
      volume:
        - [Qto_CoveringBaseQuantities, GrossVolume]
        - [BaseQuantities, GrossVolume]
      thickness:
        - [Qto_CoveringBaseQuantities, Width]
        - [BaseQuantities, Width]
    property_sets:
      fire_rating:
        - [Pset_CoveringCommon, FireRating]

  plate:
    ifc_classes:
      - IfcPlate
    quantity_sets:
      length:
        - [Qto_PlateBaseQuantities, Length]
        - [BaseQuantities, Length]
        - [Tekla Quantity, Length]
      area:
        - [Qto_PlateBaseQuantities, GrossArea]
        - [Qto_PlateBaseQuantities, NetArea]
        - [BaseQuantities, GrossArea]
        - [Tekla Quantity, Area]
        - [Tekla Quantity, Net area]
      volume:
        - [Qto_PlateBaseQuantities, GrossVolume]
        - [BaseQuantities, GrossVolume]
        - [Tekla Quantity, Volume]
        - [Tekla Quantity, Net volume]
      thickness:
        - [Qto_PlateBaseQuantities, Width]
        - [BaseQuantities, Width]
      weight:
        # Çelik levha ağırlığı
        - [Tekla Quantity, Weight]
        - [Tekla Quantity, Net weight]
        - [Tekla Common, WEIGHT]
    property_sets:
      profile:
        - [Tekla Common, PROFILE]
      structural_material:
        - [Tekla Common, MATERIAL]

  # ─── Donatı Çubuğu (item-2) ──────────────────────────────────────────────
  # Tekla'da en sık kullanılan element tipi. Metraj birimi: adet + uzunluk + kg.
  # IFC4: Qto_ReinforcingBarBaseQuantities | IFC2x3: BaseQuantities
  rebar:
    ifc_classes:
      - IfcReinforcingBar
    quantity_sets:
      length:
        - [Qto_ReinforcingBarBaseQuantities, Length]
        - [BaseQuantities, Length]
        - [Tekla Rebar, LENGTH]
        - [Tekla Quantity, Length]
      weight:
        # Net ağırlık — donatı hesaplamalarında birincil değer
        - [Qto_ReinforcingBarBaseQuantities, Weight]
        - [BaseQuantities, Weight]
        - [Tekla Rebar, WEIGHT_NET]
        - [Tekla Rebar, WEIGHT]
        - [Tekla Quantity, Weight]
        - [Tekla Quantity, Net weight]
      area:
        # Çubuk kesit alanı (opsiyonel — Pset_ReinforcingBarCommon'dan gelir)
        - [Qto_ReinforcingBarBaseQuantities, CrossSectionArea]
        - [BaseQuantities, CrossSectionArea]
    property_sets:
      structural_material:
        - [Pset_ReinforcingBarCommon, SteelGrade]
        - [Tekla Rebar, GRADE]
        - [Tekla Common, MATERIAL]
      diameter_nominal:
        - [Pset_ReinforcingBarCommon, NominalDiameter]
        - [Tekla Rebar, DIAMETER]
        - [Tekla Rebar, RADIUS]
      bar_role:
        # Boyuna donatı vs etriye ayrımı için
        - [Pset_ReinforcingBarCommon, BarRole]
      tekla_class:
        - [Tekla Common, CLASS]

  # ─── Donatı Hasırı (item-2) ──────────────────────────────────────────────
  # Döşeme ve perde duvar hasır donatısı. Metraj: m² + kg.
  mesh:
    ifc_classes:
      - IfcReinforcingMesh
    quantity_sets:
      area:
        - [Qto_ReinforcingMeshBaseQuantities, MeshLength]   # proxy: uzunluk × genişlik dışarıda hesaplanır
        - [BaseQuantities, GrossArea]
        - [Tekla Quantity, Area]
        - [Tekla Quantity, Net area]
      length:
        - [Qto_ReinforcingMeshBaseQuantities, MeshLength]
        - [BaseQuantities, Length]
        - [Tekla Quantity, Length]
      weight:
        - [Qto_ReinforcingMeshBaseQuantities, Weight]
        - [BaseQuantities, Weight]
        - [Tekla Quantity, Weight]
        - [Tekla Quantity, Net weight]
        - [Tekla Common, WEIGHT]
    property_sets:
      structural_material:
        - [Pset_ReinforcingMeshCommon, SteelGrade]
        - [Tekla Common, MATERIAL]
      tekla_class:
        - [Tekla Common, CLASS]

# ─── Yazılım-spesifik Pset ön ekleri ────────────────────────────────────────
# Kullanım: Vendor-spesifik property set'leri filtreleme/gruplayarak raporlama
vendor_pset_prefixes:
  revit:
    - "Revit "
    - "REVIT_"
  tekla:
    - "Tekla "
    - "TEKLA_"
    - "TeklaBIM"
  archicad:
    - "ArchiCAD "
    - "ARCHICAD_"
    - "AC_Pset"
  allplan:
    - "Allplan "
